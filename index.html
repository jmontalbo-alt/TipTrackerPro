<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tip Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --text: #f0f0f0;
    --muted: #7a7a8c;
    --danger: #ff4d6d;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .brand-name {
    font-family: var(--mono);
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  .brand-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 20px 28px 0;
  }
  .tab {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 7px 16px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: #555; }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f11;
  }

  /* ── MAIN CONTENT ── */
  main { padding: 24px 28px; }

  /* ── STAT CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .stat-value.highlight { color: var(--accent); }
  .stat-delta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .stat-delta.up { color: var(--accent); }
  .stat-delta.down { color: var(--danger); }

  /* ── LOG ENTRY FORM ── */
  .log-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 120px;
  }
  .form-group label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .form-group input, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .form-group select option { background: var(--surface2); }

  .btn-add {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #0f0f11;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 10px 24px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-add:active { opacity: 0.7; }

  /* ── HOURLY CHART ── */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .chart-wrap {
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 130px;
    min-width: 500px;
    padding-top: 10px;
  }
  .bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    gap: 4px;
  }
  .bar-amount {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
  }
  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--accent-dim);
    border: 1px solid rgba(200,241,53,0.25);
    min-height: 4px;
    transition: background 0.2s;
    position: relative;
    cursor: default;
  }
  .bar.active-hour {
    background: var(--accent);
  }
  .bar-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    text-align: center;
  }

  /* ── ENTRY LIST ── */
  .entries-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .entries-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--danger);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 5px 12px;
    font-family: var(--sans);
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-clear:hover { background: rgba(255,77,109,0.1); border-color: var(--danger); }

  .entry-list { max-height: 280px; overflow-y: auto; }
  .entry-row {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:hover { background: var(--surface2); }

  .entry-amount {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 70px;
  }
  .entry-meta {
    flex: 1;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .entry-note {
    font-size: 0.78rem;
    color: var(--text);
    opacity: 0.6;
    flex: 1;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .btn-del:hover { color: var(--danger); }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* ── GOAL TRACKER ── */
  .goal-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .goal-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .goal-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }
  .goal-input-wrap label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
  .goal-input-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 8px 12px;
    outline: none;
    width: 110px;
    transition: border-color 0.15s;
  }
  .goal-input-wrap input:focus { border-color: var(--accent); }
  .goal-progress-wrap { flex: 2; min-width: 180px; }
  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-bar-fill {
    background: var(--accent);
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0f0f11;
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    transition: transform 0.25s ease;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    header { padding: 16px 16px 14px; }
    .tabs { padding: 14px 16px 0; }
    main { padding: 16px 16px; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-name">tips//</span>
    <span class="brand-sub">tracker</span>
  </div>
  <span id="live-clock" style="font-family:var(--mono);font-size:0.78rem;color:var(--muted);"></span>
</header>

<div class="tabs">
  <button class="tab active" onclick="setView('day')">Today</button>
  <button class="tab" onclick="setView('week')">Week</button>
  <button class="tab" onclick="setView('month')">Month</button>
  <button class="tab" onclick="setView('year')">Year</button>
  <button class="tab" onclick="setView('all')">All Time</button>
</div>

<main>

  <!-- STAT CARDS -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Tips</div>
      <div class="stat-value highlight" id="stat-total">$0.00</div>
      <div class="stat-delta" id="stat-period">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg / Hour</div>
      <div class="stat-value" id="stat-hourly">$0.00</div>
      <div class="stat-delta" id="stat-hours-worked">0 hrs logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Hour</div>
      <div class="stat-value" id="stat-best-hour">—</div>
      <div class="stat-delta" id="stat-best-hour-label">no data</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Entries</div>
      <div class="stat-value" id="stat-count">0</div>
      <div class="stat-delta" id="stat-avg-entry">avg per entry: —</div>
    </div>
  </div>

  <!-- GOAL -->
  <div class="goal-section">
    <div class="section-title">Daily Goal</div>
    <div class="goal-row">
      <div class="goal-input-wrap">
        <label>Target $</label>
        <input type="number" id="goal-input" placeholder="e.g. 200" min="0" step="1" oninput="updateGoal()" />
      </div>
      <div class="goal-progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="goal-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="goal-label">Set a goal to track progress</div>
      </div>
    </div>
  </div>

  <!-- LOG FORM -->
  <div class="log-section">
    <div class="section-title">Log a Tip</div>
    <div class="form-row">
      <div class="form-group" style="max-width:110px;">
        <label>Amount ($)</label>
        <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-group" style="max-width:100px;">
        <label>Hours Worked</label>
        <input type="number" id="inp-hours" placeholder="1" min="0.25" step="0.25" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Date</label>
        <input type="date" id="inp-date" />
      </div>
      <div class="form-group" style="max-width:120px;">
        <label>Hour (optional)</label>
        <select id="inp-hour">
          <option value="">— hour —</option>
          <option>12am</option><option>1am</option><option>2am</option><option>3am</option>
          <option>4am</option><option>5am</option><option>6am</option><option>7am</option>
          <option>8am</option><option>9am</option><option>10am</option><option>11am</option>
          <option>12pm</option><option>1pm</option><option>2pm</option><option>3pm</option>
          <option>4pm</option><option>5pm</option><option>6pm</option><option>7pm</option>
          <option>8pm</option><option>9pm</option><option>10pm</option><option>11pm</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <input type="text" id="inp-note" placeholder="e.g. Friday dinner rush" />
      </div>
      <button class="btn-add" onclick="addEntry()">+ Add</button>
    </div>
  </div>

  <!-- HOURLY CHART -->
  <div class="chart-section">
    <div class="section-title">Tips by Hour of Day</div>
    <div class="chart-wrap">
      <div class="bar-chart" id="bar-chart"></div>
    </div>
  </div>

  <!-- ENTRY LIST -->
  <div class="entries-section">
    <div class="entries-header">
      <span class="section-title" style="margin:0">Recent Entries</span>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div class="entry-list" id="entry-list">
      <div class="empty-state">No tips logged yet. Add your first entry above.</div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('tip_entries') || '[]');
let goal = parseFloat(localStorage.getItem('tip_goal') || '0');
let currentView = 'day';

const hours12 = ['12am','1am','2am','3am','4am','5am','6am','7am','8am','9am','10am','11am',
                  '12pm','1pm','2pm','3pm','4pm','5pm','6pm','7pm','8pm','9pm','10pm','11pm'];

// ── INIT ───────────────────────────────────────────────────────
function init() {
  const dateInput = document.getElementById('inp-date');
  dateInput.value = todayStr();
  if (goal > 0) document.getElementById('goal-input').value = goal;
  render();
  startClock();
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function startClock() {
  const el = document.getElementById('live-clock');
  const tick = () => {
    const now = new Date();
    el.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };
  tick(); setInterval(tick, 1000);
}

// ── VIEW ───────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

function filterByView(v) {
  const now = new Date();
  return entries.filter(e => {
    const d = new Date(e.date + 'T12:00:00');
    if (v === 'day') return e.date === todayStr();
    if (v === 'week') {
      const start = new Date(now); start.setDate(now.getDate() - now.getDay());
      return d >= start;
    }
    if (v === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    if (v === 'year') return d.getFullYear() === now.getFullYear();
    return true; // all
  });
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const filtered = filterByView(currentView);
  renderStats(filtered);
  renderChart();
  renderList();
  updateGoal();
}

function renderStats(filtered) {
  const total = filtered.reduce((s, e) => s + e.amount, 0);
  const totalHours = filtered.reduce((s, e) => s + (e.hours || 0), 0);
  const hourly = totalHours > 0 ? total / totalHours : 0;
  const count = filtered.length;
  const avgEntry = count > 0 ? total / count : 0;

  // Best hour
  const hourMap = {};
  filtered.forEach(e => {
    if (e.hour) hourMap[e.hour] = (hourMap[e.hour] || 0) + e.amount;
  });
  const bestHour = Object.entries(hourMap).sort((a,b) => b[1]-a[1])[0];

  const labels = { day:'Today', week:'This week', month:'This month', year:'This year', all:'All time' };

  document.getElementById('stat-total').textContent = fmt(total);
  document.getElementById('stat-period').textContent = labels[currentView];
  document.getElementById('stat-hourly').textContent = fmt(hourly);
  document.getElementById('stat-hours-worked').textContent = totalHours > 0 ? `${totalHours.toFixed(1)} hrs logged` : 'No hours logged';
  document.getElementById('stat-best-hour').textContent = bestHour ? fmt(bestHour[1]) : '—';
  document.getElementById('stat-best-hour-label').textContent = bestHour ? bestHour[0] : 'no data';
  document.getElementById('stat-count').textContent = count;
  document.getElementById('stat-avg-entry').textContent = count > 0 ? `avg ${fmt(avgEntry)}/entry` : 'no entries';
}

function renderChart() {
  const chart = document.getElementById('bar-chart');
  const now = new Date();
  const currentHourLabel = hours12[now.getHours()];

  // Use all-time data for hourly distribution (more useful)
  const hourMap = {};
  hours12.forEach(h => hourMap[h] = 0);
  entries.forEach(e => { if (e.hour) hourMap[e.hour] = (hourMap[e.hour] || 0) + e.amount; });

  const max = Math.max(...Object.values(hourMap), 1);

  chart.innerHTML = hours12.map(h => {
    const val = hourMap[h] || 0;
    const pct = Math.max((val / max) * 100, val > 0 ? 4 : 1);
    const isNow = h === currentHourLabel;
    return `
      <div class="bar-col">
        <div class="bar-amount">${val > 0 ? '$'+Math.round(val) : ''}</div>
        <div class="bar ${isNow ? 'active-hour' : ''}" style="height:${pct}%" title="${h}: ${fmt(val)}"></div>
        <div class="bar-label">${h}</div>
      </div>`;
  }).join('');
}

function renderList() {
  const list = document.getElementById('entry-list');
  const sorted = [...entries].sort((a,b) => b.ts - a.ts).slice(0, 50);
  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">No tips logged yet. Add your first entry above.</div>';
    return;
  }
  list.innerHTML = sorted.map((e, i) => `
    <div class="entry-row">
      <div class="entry-amount">${fmt(e.amount)}</div>
      <div class="entry-meta">${e.date}${e.hour ? ' · ' + e.hour : ''}${e.hours ? ' · ' + e.hours + 'h' : ''}</div>
      <div class="entry-note">${e.note || ''}</div>
      <button class="btn-del" onclick="deleteEntry(${e.ts})" title="Delete">×</button>
    </div>`).join('');
}

// ── ADD / DELETE ───────────────────────────────────────────────
function addEntry() {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const hours  = parseFloat(document.getElementById('inp-hours').value) || 0;
  const date   = document.getElementById('inp-date').value || todayStr();
  const hour   = document.getElementById('inp-hour').value;
  const note   = document.getElementById('inp-note').value.trim();

  if (!amount || isNaN(amount) || amount <= 0) { toast('Enter a valid tip amount'); return; }

  entries.push({ amount, hours, date, hour, note, ts: Date.now() + Math.random() });
  save();
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-hours').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('inp-date').value = todayStr();
  document.getElementById('inp-hour').value = '';
  render();
  toast(`+${fmt(amount)} logged!`);
}

function deleteEntry(ts) {
  entries = entries.filter(e => e.ts !== ts);
  save();
  render();
}

function clearAll() {
  if (!confirm('Clear all tip entries? This cannot be undone.')) return;
  entries = [];
  save();
  render();
  toast('All entries cleared.');
}

// ── GOAL ──────────────────────────────────────────────────────
function updateGoal() {
  const val = parseFloat(document.getElementById('goal-input').value) || 0;
  goal = val;
  localStorage.setItem('tip_goal', val);

  const todayTotal = entries.filter(e => e.date === todayStr()).reduce((s,e) => s + e.amount, 0);
  const fill = document.getElementById('goal-fill');
  const label = document.getElementById('goal-label');

  if (val <= 0) {
    fill.style.width = '0%';
    label.textContent = 'Set a goal to track progress';
    return;
  }
  const pct = Math.min((todayTotal / val) * 100, 100);
  fill.style.width = pct + '%';
  const remaining = val - todayTotal;
  if (remaining <= 0) {
    label.textContent = `Goal hit! 🎯 ${fmt(todayTotal)} / ${fmt(val)}`;
    label.style.color = 'var(--accent)';
  } else {
    label.textContent = `${fmt(todayTotal)} / ${fmt(val)} · ${fmt(remaining)} to go`;
    label.style.color = 'var(--muted)';
  }
}

// ── UTILS ──────────────────────────────────────────────────────
function fmt(n) {
  return '$' + (n || 0).toFixed(2);
}
function save() {
  localStorage.setItem('tip_entries', JSON.stringify(entries));
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── KEYBOARD SHORTCUT ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter') && document.getElementById('inp-amount') === document.activeElement) {
    addEntry();
  }
});

init();
</script>
