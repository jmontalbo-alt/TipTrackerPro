<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tip Tracker Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #222228; --border: #2e2e38;
    --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12); --text: #f0f0f0;
    --muted: #7a7a8c; --danger: #ff4d6d; --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0 0 60px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 24px 28px 20px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand-name { font-family: var(--mono); font-size: 1.05rem; font-weight: 500; letter-spacing: 0.04em; color: var(--accent); }
  .brand-sub { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .sync-status { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .sync-dot.error { background: var(--danger); }
  .tabs { display: flex; gap: 4px; padding: 20px 28px 0; flex-wrap: wrap; }
  .tab { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-family: var(--sans); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em; padding: 7px 16px; text-transform: uppercase; transition: all 0.15s; }
  .tab:hover { color: var(--text); border-color: #555; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0f0f11; }
  main { padding: 24px 28px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .stat-label { color: var(--muted); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--mono); font-size: 1.6rem; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-value.highlight { color: var(--accent); }
  .stat-delta { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }
  .log-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; margin-bottom: 28px; }
  .section-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
  .form-group label { font-size: 0.72rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }
  .form-group input, .form-group select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 0.9rem; padding: 10px 13px; outline: none; transition: border-color 0.15s; width: 100%; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .btn-add { background: var(--accent); border: none; border-radius: 7px; color: #0f0f11; cursor: pointer; font-family: var(--sans); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em; padding: 10px 24px; transition: opacity 0.15s; white-space: nowrap; }
  .btn-add:hover { opacity: 0.85; }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
  .goal-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; margin-bottom: 28px; }
  .goal-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .goal-input-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
  .goal-input-wrap label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
  .goal-input-wrap input { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 0.9rem; padding: 8px 12px; outline: none; width: 110px; transition: border-color 0.15s; }
  .goal-input-wrap input:focus { border-color: var(--accent); }
  .goal-progress-wrap { flex: 2; min-width: 180px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { background: var(--accent); height: 100%; border-radius: 999px; transition: width 0.4s ease; }
  .progress-label { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; margin-bottom: 28px; }
  .chart-wrap { overflow-x: auto; padding-bottom: 4px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 130px; min-width: 500px; padding-top: 10px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
  .bar-amount { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); text-align: center; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.25); min-height: 4px; transition: background 0.2s; cursor: default; }
  .bar.active-hour { background: var(--accent); }
  .bar-label { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); text-align: center; }
  .entries-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
  .entries-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .btn-clear { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--danger); cursor: pointer; font-size: 0.72rem; padding: 5px 12px; font-family: var(--sans); font-weight: 500; transition: all 0.15s; }
  .btn-clear:hover { background: rgba(255,77,109,0.1); border-color: var(--danger); }
  .entry-list { max-height: 280px; overflow-y: auto; }
  .entry-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); gap: 12px; transition: background 0.1s; }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:hover { background: var(--surface2); }
  .entry-amount { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--accent); min-width: 70px; }
  .entry-meta { flex: 1; font-size: 0.78rem; color: var(--muted); }
  .entry-note { font-size: 0.78rem; color: var(--text); opacity: 0.6; flex: 1; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; transition: color 0.15s; }
  .btn-del:hover { color: var(--danger); }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.85rem; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #0f0f11; font-family: var(--mono); font-size: 0.82rem; font-weight: 500; padding: 10px 22px; border-radius: 8px; transition: transform 0.25s ease; pointer-events: none; z-index: 9999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 520px) { header { padding: 16px 16px 14px; } .tabs { padding: 14px 16px 0; } main { padding: 16px 16px; } .form-row { flex-direction: column; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-name">tips//</span>
    <span class="brand-sub">tracker pro</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">connecting...</span>
    </div>
    <span id="live-clock" style="font-family:var(--mono);font-size:0.78rem;color:var(--muted);"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="setView('day',this)">Today</button>
  <button class="tab" onclick="setView('week',this)">Week</button>
  <button class="tab" onclick="setView('month',this)">Month</button>
  <button class="tab" onclick="setView('year',this)">Year</button>
  <button class="tab" onclick="setView('all',this)">All Time</button>
</div>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Tips</div>
      <div class="stat-value highlight" id="stat-total">$0.00</div>
      <div class="stat-delta" id="stat-period">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg / Hour</div>
      <div class="stat-value" id="stat-hourly">$0.00</div>
      <div class="stat-delta" id="stat-hours-worked">0 hrs logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Hour</div>
      <div class="stat-value" id="stat-best-hour">—</div>
      <div class="stat-delta" id="stat-best-hour-label">no data</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Entries</div>
      <div class="stat-value" id="stat-count">0</div>
      <div class="stat-delta" id="stat-avg-entry">avg per entry: —</div>
    </div>
  </div>

  <div class="goal-section">
    <div class="section-title">Daily Goal</div>
    <div class="goal-row">
      <div class="goal-input-wrap">
        <label>Target $</label>
        <input type="number" id="goal-input" placeholder="e.g. 200" min="0" step="1" oninput="updateGoal()" />
      </div>
      <div class="goal-progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="goal-fill" style="width:0%"></div></div>
        <div class="progress-label" id="goal-label">Set a goal to track progress</div>
      </div>
    </div>
  </div>

  <div class="log-section">
    <div class="section-title">Log a Tip</div>
    <div class="form-row">
      <div class="form-group" style="max-width:110px;">
        <label>Amount ($)</label>
        <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-group" style="max-width:100px;">
        <label>Hours Worked</label>
        <input type="number" id="inp-hours" placeholder="1" min="0.25" step="0.25" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Date</label>
        <input type="date" id="inp-date" />
      </div>
      <div class="form-group" style="max-width:120px;">
        <label>Hour (optional)</label>
        <select id="inp-hour">
          <option value="">— hour —</option>
          <option>12am</option><option>1am</option><option>2am</option><option>3am</option>
          <option>4am</option><option>5am</option><option>6am</option><option>7am</option>
          <option>8am</option><option>9am</option><option>10am</option><option>11am</option>
          <option>12pm</option><option>1pm</option><option>2pm</option><option>3pm</option>
          <option>4pm</option><option>5pm</option><option>6pm</option><option>7pm</option>
          <option>8pm</option><option>9pm</option><option>10pm</option><option>11pm</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <input type="text" id="inp-note" placeholder="e.g. Friday dinner rush" />
      </div>
      <button class="btn-add" id="btn-add" onclick="addEntry()">+ Add</button>
    </div>
  </div>

  <div class="chart-section">
    <div class="section-title">Tips by Hour of Day</div>
    <div class="chart-wrap"><div class="bar-chart" id="bar-chart"></div></div>
  </div>

  <div class="entries-section">
    <div class="entries-header">
      <span class="section-title" style="margin:0">Recent Entries</span>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div class="entry-list" id="entry-list">
      <div class="empty-state">Connecting to database...</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyBdtBJHFEA0SPsQrYvX_MSGyLRorKA8MnA",
  authDomain: "tiptrackerpro-5d7e7.firebaseapp.com",
  projectId: "tiptrackerpro-5d7e7",
  storageBucket: "tiptrackerpro-5d7e7.firebasestorage.app",
  messagingSenderId: "534371623818",
  appId: "1:534371623818:web:808da44dce9c95967f5e73"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var entries = [];
var goal = parseFloat(localStorage.getItem('tip_goal') || '0');
var currentView = 'day';
var hours12 = ['12am','1am','2am','3am','4am','5am','6am','7am','8am','9am','10am','11am',
               '12pm','1pm','2pm','3pm','4pm','5pm','6pm','7pm','8pm','9pm','10pm','11pm'];

function setSyncStatus(state) {
  var dot = document.getElementById('sync-dot');
  var label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (state === 'live') { dot.classList.add('live'); label.textContent = 'live sync'; }
  else if (state === 'error') { dot.classList.add('error'); label.textContent = 'offline'; }
  else { label.textContent = 'connecting...'; }
}

db.collection('tips').orderBy('ts', 'desc').onSnapshot(function(snapshot) {
  entries = snapshot.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  setSyncStatus('live');
  render();
}, function(err) {
  console.error(err);
  setSyncStatus('error');
  toast('Sync error: ' + err.message);
});

function init() {
  document.getElementById('inp-date').value = todayStr();
  loadGoal();
  startClock();
}

function loadGoal() {
  db.collection('settings').doc('goal').get().then(function(snap) {
    if (snap.exists) {
      goal = snap.data().value || 0;
      if (goal > 0) { document.getElementById('goal-input').value = goal; updateGoal(); }
    }
  }).catch(function(){});
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function startClock() {
  var el = document.getElementById('live-clock');
  function tick() { el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
  tick(); setInterval(tick, 1000);
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function filterByView(v) {
  var now = new Date();
  return entries.filter(function(e) {
    var d = new Date(e.date + 'T12:00:00');
    if (v === 'day') return e.date === todayStr();
    if (v === 'week') { var start = new Date(now); start.setDate(now.getDate() - now.getDay()); return d >= start; }
    if (v === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    if (v === 'year') return d.getFullYear() === now.getFullYear();
    return true;
  });
}

function render() {
  var filtered = filterByView(currentView);
  renderStats(filtered); renderChart(); renderList(); updateGoal();
}

function renderStats(filtered) {
  var total = filtered.reduce(function(s,e) { return s + e.amount; }, 0);
  var totalHours = filtered.reduce(function(s,e) { return s + (e.hours || 0); }, 0);
  var hourly = totalHours > 0 ? total / totalHours : 0;
  var count = filtered.length;
  var avgEntry = count > 0 ? total / count : 0;
  var hourMap = {};
  filtered.forEach(function(e) { if (e.hour) hourMap[e.hour] = (hourMap[e.hour] || 0) + e.amount; });
  var bestHour = Object.entries(hourMap).sort(function(a,b) { return b[1]-a[1]; })[0];
  var labels = { day:'Today', week:'This week', month:'This month', year:'This year', all:'All time' };
  document.getElementById('stat-total').textContent = fmt(total);
  document.getElementById('stat-period').textContent = labels[currentView];
  document.getElementById('stat-hourly').textContent = fmt(hourly);
  document.getElementById('stat-hours-worked').textContent = totalHours > 0 ? totalHours.toFixed(1) + ' hrs logged' : 'No hours logged';
  document.getElementById('stat-best-hour').textContent = bestHour ? fmt(bestHour[1]) : '—';
  document.getElementById('stat-best-hour-label').textContent = bestHour ? bestHour[0] : 'no data';
  document.getElementById('stat-count').textContent = count;
  document.getElementById('stat-avg-entry').textContent = count > 0 ? 'avg ' + fmt(avgEntry) + '/entry' : 'no entries';
}

function renderChart() {
  var chart = document.getElementById('bar-chart');
  var currentHourLabel = hours12[new Date().getHours()];
  var hourMap = {};
  hours12.forEach(function(h) { hourMap[h] = 0; });
  entries.forEach(function(e) { if (e.hour) hourMap[e.hour] = (hourMap[e.hour] || 0) + e.amount; });
  var max = Math.max.apply(null, Object.values(hourMap).concat([1]));
  chart.innerHTML = hours12.map(function(h) {
    var val = hourMap[h] || 0;
    var pct = Math.max((val / max) * 100, val > 0 ? 4 : 1);
    var isNow = h === currentHourLabel;
    return '<div class="bar-col"><div class="bar-amount">' + (val > 0 ? '$' + Math.round(val) : '') + '</div><div class="bar ' + (isNow ? 'active-hour' : '') + '" style="height:' + pct + '%"></div><div class="bar-label">' + h + '</div></div>';
  }).join('');
}

function renderList() {
  var list = document.getElementById('entry-list');
  var sorted = entries.slice(0, 50);
  if (sorted.length === 0) { list.innerHTML = '<div class="empty-state">No tips logged yet. Add your first entry above.</div>'; return; }
  list.innerHTML = sorted.map(function(e) {
    return '<div class="entry-row"><div class="entry-amount">' + fmt(e.amount) + '</div><div class="entry-meta">' + e.date + (e.hour ? ' · ' + e.hour : '') + (e.hours ? ' · ' + e.hours + 'h' : '') + '</div><div class="entry-note">' + (e.note || '') + '</div><button class="btn-del" onclick="deleteEntry(\'' + e.id + '\')">×</button></div>';
  }).join('');
}

function addEntry() {
  var amount = parseFloat(document.getElementById('inp-amount').value);
  var hours  = parseFloat(document.getElementById('inp-hours').value) || 0;
  var date   = document.getElementById('inp-date').value || todayStr();
  var hour   = document.getElementById('inp-hour').value;
  var note   = document.getElementById('inp-note').value.trim();
  if (!amount || isNaN(amount) || amount <= 0) { toast('Enter a valid tip amount'); return; }
  var btn = document.getElementById('btn-add');
  btn.disabled = true;
  db.collection('tips').add({ amount: amount, hours: hours, date: date, hour: hour, note: note, ts: Date.now() }).then(function() {
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-hours').value = '';
    document.getElementById('inp-note').value = '';
    document.getElementById('inp-date').value = todayStr();
    document.getElementById('inp-hour').value = '';
    toast('+' + fmt(amount) + ' logged!');
    btn.disabled = false;
  }).catch(function(e) { toast('Error: ' + e.message); btn.disabled = false; });
}

function deleteEntry(id) {
  db.collection('tips').doc(id).delete().catch(function(e) { toast('Error deleting.'); });
}

function clearAll() {
  if (!confirm('Clear ALL tip entries? Cannot be undone.')) return;
  db.collection('tips').get().then(function(snap) {
    var batch = db.batch();
    snap.docs.forEach(function(d) { batch.delete(d.ref); });
    return batch.commit();
  }).then(function() { toast('All entries cleared.'); }).catch(function() { toast('Error clearing.'); });
}

function updateGoal() {
  var val = parseFloat(document.getElementById('goal-input').value) || 0;
  goal = val;
  localStorage.setItem('tip_goal', val);
  db.collection('settings').doc('goal').set({ value: val }).catch(function(){});
  var todayTotal = entries.filter(function(e) { return e.date === todayStr(); }).reduce(function(s,e) { return s + e.amount; }, 0);
  var fill = document.getElementById('goal-fill');
  var label = document.getElementById('goal-label');
  if (val <= 0) { fill.style.width = '0%'; label.textContent = 'Set a goal to track progress'; return; }
  var pct = Math.min((todayTotal / val) * 100, 100);
  fill.style.width = pct + '%';
  var remaining = val - todayTotal;
  if (remaining <= 0) { label.textContent = 'Goal hit! 🎯 ' + fmt(todayTotal) + ' / ' + fmt(val); label.style.color = 'var(--accent)'; }
  else { label.textContent = fmt(todayTotal) + ' / ' + fmt(val) + ' · ' + fmt(remaining) + ' to go'; label.style.color = 'var(--muted)'; }
}

function fmt(n) { return '$' + (n || 0).toFixed(2); }

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('inp-amount') === document.activeElement) addEntry();
});

init();
</script>
</body>
</html>
