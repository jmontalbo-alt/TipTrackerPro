<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tip Tracker</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --accent: #22c55e;
    --accent-soft: rgba(34, 197, 94, 0.15);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px 16px 64px;
  }

  .wrap { max-width: 880px; margin: 0 auto; }

  h1 {
    font-size: 28px;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .subtitle { color: var(--muted); margin: 0 0 28px; font-size: 15px; }

  /* ---- Entry form ---- */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  form .row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
  .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .field input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 16px;
    width: 100%;
  }
  .field input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  button {
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    border: none;
    border-radius: 9px;
    transition: filter .12s ease;
  }
  button:hover { filter: brightness(1.08); }

  .btn-primary {
    background: var(--accent);
    color: #052e16;
    padding: 11px 22px;
    font-size: 16px;
  }

  .preview {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    min-height: 20px;
  }
  .preview b { color: var(--accent); }

  /* ---- Summary cards ---- */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin: 24px 0;
  }
  @media (max-width: 700px) { .summary { grid-template-columns: repeat(2, 1fr); } }

  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .stat .label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; }
  .stat .big { font-size: 26px; font-weight: 700; margin: 8px 0 2px; }
  .stat .rate { color: var(--accent); font-weight: 700; font-size: 15px; }
  .stat .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ---- View toggle ---- */
  .view-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .view-head h2 { font-size: 18px; margin: 0; }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; padding: 4px; }
  .tabs button {
    background: transparent;
    color: var(--muted);
    padding: 7px 16px;
    font-size: 14px;
  }
  .tabs button.active { background: var(--accent-soft); color: var(--accent); }

  /* ---- Table ---- */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 15px; }
  th { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rate-pill { color: var(--accent); font-weight: 700; }
  tr.group-row td { font-weight: 700; }

  .del {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 10px;
    font-size: 13px;
  }
  .del:hover { color: var(--danger); border-color: var(--danger); }

  .empty { text-align: center; color: var(--muted); padding: 40px 0; }

  .footer-actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--border); padding: 9px 16px; font-size: 13px; }

  /* ---- Sync bar ---- */
  .sync-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 0 0 24px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; font-size: 13px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
  .sync-dot.on { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .sync-state { color: var(--muted); }
  .sync-state b { color: var(--text); font-weight: 600; }
  .sync-input { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 13px; min-width: 0; flex: 1 1 130px; }
  .sync-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .sync-btn { padding: 7px 14px; font-size: 13px; }
  .sync-msg { color: var(--danger); flex-basis: 100%; }
  .sync-msg:empty { display: none; }

  /* ---- Calendar view ---- */
  .cal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 4px 16px; flex-wrap: wrap; }
  .cal-title { font-size: 17px; font-weight: 700; }
  .cal-month-total { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .cal-month-total b { color: var(--accent); }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 9px; font-size: 18px; line-height: 1; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 0 4px 10px; }
  .cal-dow { text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; padding-bottom: 2px; }
  .cal-cell { min-height: 66px; border: 1px solid var(--border); border-radius: 10px; padding: 6px 7px; background: var(--panel-2); display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-cell.clickable { cursor: pointer; transition: filter .12s ease, border-color .12s ease; }
  .cal-cell.clickable:hover { filter: brightness(1.12); border-color: var(--muted); }
  .cal-cell.has-data { border-color: var(--accent); background: var(--accent-soft); }
  .cal-cell.today { outline: 2px solid var(--accent); outline-offset: -2px; }
  .cal-day { font-size: 12px; color: var(--muted); font-weight: 600; }
  .cal-cell.today .cal-day { color: var(--accent); }
  .cal-amt { font-size: 14px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .cal-rate { font-size: 11px; color: var(--accent); font-weight: 700; }
  @media (max-width: 560px) {
    .cal-grid { gap: 4px; }
    .cal-cell { min-height: 50px; padding: 5px 4px; border-radius: 8px; }
    .cal-amt { font-size: 12px; }
    .cal-rate { display: none; } /* hide per-day rate on narrow screens ‚Äî tap a day or use the Day tab */
    .cal-dow { font-size: 10px; }
    .cal-nav button { width: 30px; height: 30px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>üíµ Tip Tracker</h1>
  <p class="subtitle">Log your tips and hours each day ‚Äî see your hourly average for the week, month, year, and all time.</p>

  <!-- Cloud sync bar (only shown when Firebase is configured) -->
  <div id="sync-bar" class="sync-bar" hidden></div>

  <!-- Entry form -->
  <div class="card">
    <form id="entry-form">
      <div class="row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>
        <div class="field">
          <label for="tips">Total tips ($)</label>
          <input type="number" id="tips" min="0" step="0.01" placeholder="0.00" required />
        </div>
        <div class="field">
          <label for="hours">Hours worked</label>
          <input type="number" id="hours" min="0" step="0.25" placeholder="0" required />
        </div>
        <button type="submit" class="btn-primary">Add / Update Day</button>
      </div>
      <div class="preview" id="preview"></div>
    </form>
  </div>

  <!-- Summary cards -->
  <div class="summary" id="summary"></div>

  <!-- Breakdown -->
  <div class="view-head">
    <h2>Breakdown</h2>
    <div class="tabs" id="tabs">
      <button data-view="calendar" class="active">Calendar</button>
      <button data-view="day">Day</button>
      <button data-view="week">Week</button>
      <button data-view="month">Month</button>
      <button data-view="year">Year</button>
    </div>
  </div>
  <div class="card" style="padding: 6px 14px;">
    <div id="table-area"></div>
  </div>

  <div class="footer-actions">
    <button class="btn-ghost" id="export-btn">‚¨á Export my data (backup)</button>
    <button class="btn-ghost" id="import-btn">‚¨Ü Import data</button>
    <input type="file" id="import-file" accept="application/json" style="display:none" />
  </div>
</div>

<script>
/* ============================================================
   Tip Tracker ‚Äî all logic lives here.
   Data is stored in your browser (localStorage) as a list of
   entries: { date: "YYYY-MM-DD", tips: number, hours: number }
   ============================================================ */

const STORAGE_KEY = "tipTrackerEntries";
let entries = load();
let currentView = "calendar";
let calY = null, calM = null; // calendar cursor (year, 0-indexed month); set on first render

/* ============================================================
   Cloud sync (OPTIONAL) ‚Äî Firebase Firestore.
   Leave FIREBASE_CONFIG.apiKey blank to run purely on
   localStorage (no network, no accounts).
   NOTE: the Firebase web config is NOT a secret ‚Äî it is meant to
   live in client code. Access is controlled by Firestore security
   rules, not by hiding these values.

   This points at the existing "tiptrackerpro-5d7e7" project (the
   one behind jmontalbo-alt.github.io/TipTrackerPro) so the same
   project carries forward ‚Äî see tip-tracker-sync-setup.md for the
   two console steps (enable Email/Password auth, publish the
   locked-down rules) that make this safe to use.
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBdtBJHFEA0SPsQrYvX_MSGyLRorKA8MnA",
  authDomain: "tiptrackerpro-5d7e7.firebaseapp.com",
  projectId: "tiptrackerpro-5d7e7",
};

let fb = null;             // { auth, db } once Firebase is initialized
let fbUser = null;         // signed-in user, or null
let initialSyncDone = false; // guards the one-time merge on sign-in

/* ---------- storage ---------- */
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

/* ---------- helpers ---------- */
const fmtMoney = n => "$" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtRate  = n => isFinite(n) && n > 0 ? "$" + n.toFixed(2) + "/hr" : "‚Äî";
// Compact money for tight calendar cells (no cents): $150, $2,163
const fmtMoneyCompact = n => "$" + Math.round(n).toLocaleString();
// Rate without the "/hr" suffix ‚Äî used in narrow calendar cells to avoid clipping
const fmtRateBare = n => isFinite(n) && n > 0 ? "$" + n.toFixed(2) : "‚Äî";

function todayStr() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
}

// Parse "YYYY-MM-DD" into a local Date (avoids timezone surprises)
function parseDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

// Monday-based week start for a given date string -> "YYYY-MM-DD"
function weekStart(str) {
  const d = parseDate(str);
  const day = (d.getDay() + 6) % 7; // 0 = Monday
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0, 10);
}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function prettyDate(str) {
  const d = parseDate(str);
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${days[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ---------- totals over a filtered set ---------- */
function totals(list) {
  const tips = list.reduce((s, e) => s + e.tips, 0);
  const hours = list.reduce((s, e) => s + e.hours, 0);
  return { tips, hours, rate: hours > 0 ? tips / hours : 0, days: list.length };
}

/* ---------- summary cards (week / month / year / all) ---------- */
function renderSummary() {
  const today = todayStr();
  const thisWeek  = weekStart(today);
  const thisMonth = today.slice(0, 7);
  const thisYear  = today.slice(0, 4);

  const week  = totals(entries.filter(e => weekStart(e.date) === thisWeek));
  const month = totals(entries.filter(e => e.date.slice(0, 7) === thisMonth));
  const year  = totals(entries.filter(e => e.date.slice(0, 4) === thisYear));
  const all   = totals(entries);

  const cards = [
    { label: "This Week",  t: week },
    { label: "This Month", t: month },
    { label: "This Year",  t: year },
    { label: "All Time",   t: all },
  ];

  document.getElementById("summary").innerHTML = cards.map(c => `
    <div class="stat">
      <div class="label">${c.label}</div>
      <div class="big">${fmtMoney(c.t.tips)}</div>
      <div class="rate">${fmtRate(c.t.rate)}</div>
      <div class="sub">${c.t.hours.toLocaleString()} hrs ¬∑ ${c.t.days} day${c.t.days === 1 ? "" : "s"}</div>
    </div>
  `).join("");
}

/* ---------- calendar view ---------- */
const pad2 = n => String(n).padStart(2, "0");
function ymd(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; } // m is 0-indexed

// Grid cells for a month: leading nulls to reach Monday, then day numbers, padded to full weeks
function monthMatrix(y, m) {
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7; // Monday = 0
  const daysIn = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysIn; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  return cells;
}

// Tap a calendar day -> load it into the entry form (prefilled if it already has data)
function selectDay(dateStr) {
  document.getElementById("date").value = dateStr;
  const e = entries.find(x => x.date === dateStr);
  tipsInput.value = e ? e.tips : "";
  hoursInput.value = e ? e.hours : "";
  updatePreview();
  document.querySelector(".card").scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderCalendar() {
  const area = document.getElementById("table-area");
  if (calY === null) { const t = parseDate(todayStr()); calY = t.getFullYear(); calM = t.getMonth(); }

  const byDate = {};
  entries.forEach(e => { byDate[e.date] = e; });

  const today = todayStr();
  const dows = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const monthKey = `${calY}-${pad2(calM + 1)}`;
  const mt = totals(entries.filter(e => e.date.slice(0, 7) === monthKey));

  area.innerHTML = `
    <div class="cal-head">
      <div class="cal-nav">
        <button id="cal-prev" aria-label="Previous month">‚Äπ</button>
        <button id="cal-next" aria-label="Next month">‚Ä∫</button>
      </div>
      <div class="cal-title">${MONTHS[calM]} ${calY}</div>
      <div class="cal-month-total">${fmtMoney(mt.tips)} ¬∑ <b>${fmtRate(mt.rate)}</b></div>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join("")}
      ${monthMatrix(calY, calM).map(d => {
        if (d === null) return `<div class="cal-cell empty"></div>`;
        const ds = ymd(calY, calM, d);
        const e = byDate[ds];
        const cls = ["cal-cell", "clickable", ds === today ? "today" : "", e ? "has-data" : ""].filter(Boolean).join(" ");
        return `<div class="${cls}" data-date="${ds}">
          <div class="cal-day">${d}</div>
          ${e ? `<div class="cal-amt">${fmtMoneyCompact(e.tips)}</div><div class="cal-rate">${fmtRateBare(e.hours > 0 ? e.tips / e.hours : 0)}</div>` : ""}
        </div>`;
      }).join("")}
    </div>`;

  document.getElementById("cal-prev").addEventListener("click", () => {
    calM--; if (calM < 0) { calM = 11; calY--; } renderCalendar();
  });
  document.getElementById("cal-next").addEventListener("click", () => {
    calM++; if (calM > 11) { calM = 0; calY++; } renderCalendar();
  });
  area.querySelectorAll(".cal-cell.clickable").forEach(c =>
    c.addEventListener("click", () => selectDay(c.dataset.date)));
}

/* ---------- breakdown table ---------- */
function renderTable() {
  const area = document.getElementById("table-area");

  if (currentView === "calendar") { renderCalendar(); return; }

  if (entries.length === 0) {
    area.innerHTML = `<div class="empty">No entries yet. Add your first day above! üëÜ</div>`;
    return;
  }

  const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));

  if (currentView === "day") {
    area.innerHTML = `
      <table>
        <thead><tr>
          <th>Date</th><th class="num">Tips</th><th class="num">Hours</th>
          <th class="num">$/hr</th><th></th>
        </tr></thead>
        <tbody>
          ${sorted.map(e => `
            <tr>
              <td>${prettyDate(e.date)}</td>
              <td class="num">${fmtMoney(e.tips)}</td>
              <td class="num">${e.hours}</td>
              <td class="num"><span class="rate-pill">${fmtRate(e.hours > 0 ? e.tips / e.hours : 0)}</span></td>
              <td class="num"><button class="del" data-date="${e.date}">Delete</button></td>
            </tr>`).join("")}
        </tbody>
      </table>`;
    area.querySelectorAll(".del").forEach(b =>
      b.addEventListener("click", () => removeEntry(b.dataset.date)));
    return;
  }

  // grouped views (week / month / year)
  const groups = {};
  const labelFor = {};
  for (const e of entries) {
    let key, label;
    if (currentView === "week") {
      key = weekStart(e.date);
      label = "Week of " + prettyDate(key).replace(/^\w+ /, "");
    } else if (currentView === "month") {
      key = e.date.slice(0, 7);
      label = MONTHS[parseInt(key.slice(5, 7)) - 1] + " " + key.slice(0, 4);
    } else { // year
      key = e.date.slice(0, 4);
      label = key;
    }
    (groups[key] = groups[key] || []).push(e);
    labelFor[key] = label;
  }

  const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  area.innerHTML = `
    <table>
      <thead><tr>
        <th>${currentView[0].toUpperCase() + currentView.slice(1)}</th>
        <th class="num">Tips</th><th class="num">Hours</th>
        <th class="num">$/hr</th><th class="num">Days</th>
      </tr></thead>
      <tbody>
        ${keys.map(k => {
          const t = totals(groups[k]);
          return `<tr class="group-row">
            <td>${labelFor[k]}</td>
            <td class="num">${fmtMoney(t.tips)}</td>
            <td class="num">${t.hours}</td>
            <td class="num"><span class="rate-pill">${fmtRate(t.rate)}</span></td>
            <td class="num">${t.days}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

/* ---------- actions ---------- */
function addEntry(date, tips, hours) {
  // one entry per day ‚Äî if the date exists, replace it
  const existing = entries.find(e => e.date === date);
  if (existing) { existing.tips = tips; existing.hours = hours; }
  else { entries.push({ date, tips, hours }); }
  save();
  cloudPush();
  renderAll();
}

function removeEntry(date) {
  entries = entries.filter(e => e.date !== date);
  save();
  cloudPush();
  renderAll();
}

function renderAll() {
  renderSummary();
  renderTable();
}

/* ---------- form ---------- */
const form = document.getElementById("entry-form");
const tipsInput = document.getElementById("tips");
const hoursInput = document.getElementById("hours");
const preview = document.getElementById("preview");

function updatePreview() {
  const tips = parseFloat(tipsInput.value);
  const hours = parseFloat(hoursInput.value);
  if (tips > 0 && hours > 0) {
    preview.innerHTML = `That's <b>${fmtRate(tips / hours)}</b> for the day.`;
  } else {
    preview.innerHTML = "";
  }
}
tipsInput.addEventListener("input", updatePreview);
hoursInput.addEventListener("input", updatePreview);

form.addEventListener("submit", e => {
  e.preventDefault();
  const date = document.getElementById("date").value;
  const tips = parseFloat(tipsInput.value);
  const hours = parseFloat(hoursInput.value);
  if (!date || !(tips >= 0) || !(hours >= 0)) return;
  addEntry(date, tips, hours);
  tipsInput.value = "";
  hoursInput.value = "";
  preview.innerHTML = "";
  tipsInput.focus();
});

/* ---------- view tabs ---------- */
document.getElementById("tabs").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  currentView = e.target.dataset.view;
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b === e.target));
  renderTable();
});

/* ---------- export / import (backup) ---------- */
document.getElementById("export-btn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tip-tracker-backup.json";
  a.click();
});
document.getElementById("import-btn").addEventListener("click", () =>
  document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (Array.isArray(data)) { entries = data; save(); cloudPush(); renderAll(); alert("Imported " + data.length + " entries."); }
    } catch { alert("Could not read that file."); }
  };
  reader.readAsText(file);
});

/* ---------- cloud sync (Firebase, optional) ---------- */
function syncEnabled() { return !!(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey); }

// Inject a classic <script> (Firebase compat SDK works from file:// ‚Äî ES modules don't)
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src; s.async = true;
    s.onload = resolve;
    s.onerror = () => reject(new Error("Failed to load " + src));
    document.head.appendChild(s);
  });
}

// Union two entry lists by date; on the same date, the cloud copy wins
function mergeByDate(localArr, cloudArr) {
  const map = {};
  localArr.forEach(e => { map[e.date] = e; });
  cloudArr.forEach(e => { map[e.date] = e; });
  return Object.values(map);
}

async function initSync() {
  if (!syncEnabled()) { renderSyncBar(); return; }
  try {
    const base = "https://www.gstatic.com/firebasejs/10.12.2/";
    await loadScript(base + "firebase-app-compat.js");
    await loadScript(base + "firebase-auth-compat.js");
    await loadScript(base + "firebase-firestore-compat.js");
    firebase.initializeApp(FIREBASE_CONFIG);
    fb = { auth: firebase.auth(), db: firebase.firestore() };
    fb.auth.onAuthStateChanged(user => {
      fbUser = user;
      initialSyncDone = false;
      renderSyncBar();
      if (user) watchCloud();
    });
  } catch (err) {
    console.error("Sync init failed:", err);
    renderSyncBar();
    showSyncError("Couldn't load sync (offline or bad config).");
  }
}

function cloudRef() { return fb.db.doc("tipData/" + fbUser.uid); }

function watchCloud() {
  cloudRef().onSnapshot(snap => {
    const cloud = (snap.exists && snap.data().entries) ? snap.data().entries : [];
    if (!initialSyncDone) {
      // First payload after sign-in: merge so local-only days aren't lost
      const merged = mergeByDate(entries, cloud);
      const grew = merged.length !== cloud.length;
      entries = merged; save(); renderAll();
      initialSyncDone = true;
      if (grew) cloudPush(); // push the newly-merged local days up
    } else {
      entries = cloud; save(); renderAll();
    }
  }, err => {
    console.error("Sync listen failed:", err);
    showSyncError("Sync connection lost.");
  });
}

function cloudPush() {
  if (!fb || !fbUser) return; // no-op when signed out or sync disabled
  cloudRef().set({ entries, updatedAt: Date.now() }).catch(err => {
    console.error("Sync push failed:", err);
    showSyncError("Couldn't save to cloud (kept locally).");
  });
}

function doSignIn(email, password, create) {
  if (!fb) { showSyncError("Sync isn't loaded ‚Äî check your connection and reload."); return; }
  if (!email || !password) { showSyncError("Enter an email and password."); return; }
  const req = create
    ? fb.auth.createUserWithEmailAndPassword(email, password)
    : fb.auth.signInWithEmailAndPassword(email, password);
  req.catch(err => showSyncError(prettyAuthError(err)));
}

function prettyAuthError(err) {
  const c = (err && err.code) || "";
  if (c.includes("invalid-credential") || c.includes("wrong-password") || c.includes("user-not-found")) return "Wrong email or password.";
  if (c.includes("email-already-in-use")) return "That email already has an account ‚Äî sign in instead.";
  if (c.includes("weak-password")) return "Password must be at least 6 characters.";
  if (c.includes("invalid-email")) return "That doesn't look like a valid email.";
  if (c.includes("network")) return "Network error ‚Äî check your connection.";
  return "Sign-in failed. Please try again.";
}

function showSyncError(msg) {
  const el = document.getElementById("sync-msg");
  if (el) el.textContent = msg;
}

function renderSyncBar() {
  const bar = document.getElementById("sync-bar");
  if (!bar) return;
  if (!syncEnabled()) { bar.hidden = true; return; }
  bar.hidden = false;

  if (fbUser) {
    bar.innerHTML =
      `<span class="sync-dot on"></span>` +
      `<span class="sync-state">Synced ¬∑ <b>${fbUser.email}</b></span>` +
      `<button class="btn-ghost sync-btn" id="sync-signout">Sign out</button>` +
      `<span id="sync-msg" class="sync-msg"></span>`;
    document.getElementById("sync-signout").addEventListener("click", () => fb.auth.signOut());
  } else {
    bar.innerHTML =
      `<span class="sync-dot"></span>` +
      `<input id="sync-email" class="sync-input" type="email" placeholder="you@email.com" autocomplete="username" />` +
      `<input id="sync-pass" class="sync-input" type="password" placeholder="password" autocomplete="current-password" />` +
      `<button class="btn-primary sync-btn" id="sync-in">Sign in</button>` +
      `<button class="btn-ghost sync-btn" id="sync-up">Create account</button>` +
      `<span id="sync-msg" class="sync-msg"></span>`;
    const g = id => document.getElementById(id);
    g("sync-in").addEventListener("click", () => doSignIn(g("sync-email").value.trim(), g("sync-pass").value, false));
    g("sync-up").addEventListener("click", () => doSignIn(g("sync-email").value.trim(), g("sync-pass").value, true));
    g("sync-pass").addEventListener("keydown", e => { if (e.key === "Enter") doSignIn(g("sync-email").value.trim(), g("sync-pass").value, false); });
  }
}

/* ---------- init ---------- */
document.getElementById("date").value = todayStr();
renderAll();
initSync();
</script>
</body>
