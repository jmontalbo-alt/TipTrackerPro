<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tip Tracker</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --accent: #22c55e;
    --accent-soft: rgba(34, 197, 94, 0.15);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px 16px 64px;
  }

  .wrap { max-width: 880px; margin: 0 auto; }

  h1 {
    font-size: 28px;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .subtitle { color: var(--muted); margin: 0 0 28px; font-size: 15px; }

  /* ---- Entry form ---- */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  form .row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
  .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .field input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 16px;
    width: 100%;
  }
  .field input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  button {
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    border: none;
    border-radius: 9px;
    transition: filter .12s ease;
  }
  button:hover { filter: brightness(1.08); }

  .btn-primary {
    background: var(--accent);
    color: #052e16;
    padding: 11px 22px;
    font-size: 16px;
  }

  .preview {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    min-height: 20px;
  }
  .preview b { color: var(--accent); }

  /* ---- Summary cards ---- */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin: 24px 0;
  }
  @media (max-width: 700px) { .summary { grid-template-columns: repeat(2, 1fr); } }

  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .stat .label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; }
  .stat .big { font-size: 26px; font-weight: 700; margin: 8px 0 2px; }
  .stat .rate { color: var(--accent); font-weight: 700; font-size: 15px; }
  .stat .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ---- View toggle ---- */
  .view-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .view-head h2 { font-size: 18px; margin: 0; }
  .tabs { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; padding: 4px; }
  .tabs button {
    background: transparent;
    color: var(--muted);
    padding: 7px 16px;
    font-size: 14px;
  }
  .tabs button.active { background: var(--accent-soft); color: var(--accent); }

  /* ---- Table ---- */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 15px; }
  th { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rate-pill { color: var(--accent); font-weight: 700; }
  tr.group-row td { font-weight: 700; }

  .del {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 10px;
    font-size: 13px;
  }
  .del:hover { color: var(--danger); border-color: var(--danger); }

  .empty { text-align: center; color: var(--muted); padding: 40px 0; }

  .footer-actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--border); padding: 9px 16px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>💵 Tip Tracker</h1>
  <p class="subtitle">Log your tips and hours each day — see your hourly average for the week, month, year, and all time.</p>

  <!-- Entry form -->
  <div class="card">
    <form id="entry-form">
      <div class="row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>
        <div class="field">
          <label for="tips">Total tips ($)</label>
          <input type="number" id="tips" min="0" step="0.01" placeholder="0.00" required />
        </div>
        <div class="field">
          <label for="hours">Hours worked</label>
          <input type="number" id="hours" min="0" step="0.25" placeholder="0" required />
        </div>
        <button type="submit" class="btn-primary">Add / Update Day</button>
      </div>
      <div class="preview" id="preview"></div>
    </form>
  </div>

  <!-- Summary cards -->
  <div class="summary" id="summary"></div>

  <!-- Breakdown -->
  <div class="view-head">
    <h2>Breakdown</h2>
    <div class="tabs" id="tabs">
      <button data-view="day" class="active">Day</button>
      <button data-view="week">Week</button>
      <button data-view="month">Month</button>
      <button data-view="year">Year</button>
    </div>
  </div>
  <div class="card" style="padding: 6px 14px;">
    <div id="table-area"></div>
  </div>

  <div class="footer-actions">
    <button class="btn-ghost" id="export-btn">⬇ Export my data (backup)</button>
    <button class="btn-ghost" id="import-btn">⬆ Import data</button>
    <input type="file" id="import-file" accept="application/json" style="display:none" />
  </div>
</div>

<script>
/* ============================================================
   Tip Tracker — all logic lives here.
   Data is stored in your browser (localStorage) as a list of
   entries: { date: "YYYY-MM-DD", tips: number, hours: number }
   ============================================================ */

const STORAGE_KEY = "tipTrackerEntries";
let entries = load();
let currentView = "day";

/* ---------- storage ---------- */
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

/* ---------- helpers ---------- */
const fmtMoney = n => "$" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtRate  = n => isFinite(n) && n > 0 ? "$" + n.toFixed(2) + "/hr" : "—";

function todayStr() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
}

// Parse "YYYY-MM-DD" into a local Date (avoids timezone surprises)
function parseDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

// Monday-based week start for a given date string -> "YYYY-MM-DD"
function weekStart(str) {
  const d = parseDate(str);
  const day = (d.getDay() + 6) % 7; // 0 = Monday
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0, 10);
}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function prettyDate(str) {
  const d = parseDate(str);
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${days[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ---------- totals over a filtered set ---------- */
function totals(list) {
  const tips = list.reduce((s, e) => s + e.tips, 0);
  const hours = list.reduce((s, e) => s + e.hours, 0);
  return { tips, hours, rate: hours > 0 ? tips / hours : 0, days: list.length };
}

/* ---------- summary cards (week / month / year / all) ---------- */
function renderSummary() {
  const today = todayStr();
  const thisWeek  = weekStart(today);
  const thisMonth = today.slice(0, 7);
  const thisYear  = today.slice(0, 4);

  const week  = totals(entries.filter(e => weekStart(e.date) === thisWeek));
  const month = totals(entries.filter(e => e.date.slice(0, 7) === thisMonth));
  const year  = totals(entries.filter(e => e.date.slice(0, 4) === thisYear));
  const all   = totals(entries);

  const cards = [
    { label: "This Week",  t: week },
    { label: "This Month", t: month },
    { label: "This Year",  t: year },
    { label: "All Time",   t: all },
  ];

  document.getElementById("summary").innerHTML = cards.map(c => `
    <div class="stat">
      <div class="label">${c.label}</div>
      <div class="big">${fmtMoney(c.t.tips)}</div>
      <div class="rate">${fmtRate(c.t.rate)}</div>
      <div class="sub">${c.t.hours.toLocaleString()} hrs · ${c.t.days} day${c.t.days === 1 ? "" : "s"}</div>
    </div>
  `).join("");
}

/* ---------- breakdown table ---------- */
function renderTable() {
  const area = document.getElementById("table-area");

  if (entries.length === 0) {
    area.innerHTML = `<div class="empty">No entries yet. Add your first day above! 👆</div>`;
    return;
  }

  const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));

  if (currentView === "day") {
    area.innerHTML = `
      <table>
        <thead><tr>
          <th>Date</th><th class="num">Tips</th><th class="num">Hours</th>
          <th class="num">$/hr</th><th></th>
        </tr></thead>
        <tbody>
          ${sorted.map(e => `
            <tr>
              <td>${prettyDate(e.date)}</td>
              <td class="num">${fmtMoney(e.tips)}</td>
              <td class="num">${e.hours}</td>
              <td class="num"><span class="rate-pill">${fmtRate(e.hours > 0 ? e.tips / e.hours : 0)}</span></td>
              <td class="num"><button class="del" data-date="${e.date}">Delete</button></td>
            </tr>`).join("")}
        </tbody>
      </table>`;
    area.querySelectorAll(".del").forEach(b =>
      b.addEventListener("click", () => removeEntry(b.dataset.date)));
    return;
  }

  // grouped views (week / month / year)
  const groups = {};
  const labelFor = {};
  for (const e of entries) {
    let key, label;
    if (currentView === "week") {
      key = weekStart(e.date);
      label = "Week of " + prettyDate(key).replace(/^\w+ /, "");
    } else if (currentView === "month") {
      key = e.date.slice(0, 7);
      label = MONTHS[parseInt(key.slice(5, 7)) - 1] + " " + key.slice(0, 4);
    } else { // year
      key = e.date.slice(0, 4);
      label = key;
    }
    (groups[key] = groups[key] || []).push(e);
    labelFor[key] = label;
  }

  const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  area.innerHTML = `
    <table>
      <thead><tr>
        <th>${currentView[0].toUpperCase() + currentView.slice(1)}</th>
        <th class="num">Tips</th><th class="num">Hours</th>
        <th class="num">$/hr</th><th class="num">Days</th>
      </tr></thead>
      <tbody>
        ${keys.map(k => {
          const t = totals(groups[k]);
          return `<tr class="group-row">
            <td>${labelFor[k]}</td>
            <td class="num">${fmtMoney(t.tips)}</td>
            <td class="num">${t.hours}</td>
            <td class="num"><span class="rate-pill">${fmtRate(t.rate)}</span></td>
            <td class="num">${t.days}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

/* ---------- actions ---------- */
function addEntry(date, tips, hours) {
  // one entry per day — if the date exists, replace it
  const existing = entries.find(e => e.date === date);
  if (existing) { existing.tips = tips; existing.hours = hours; }
  else { entries.push({ date, tips, hours }); }
  save();
  renderAll();
}

function removeEntry(date) {
  entries = entries.filter(e => e.date !== date);
  save();
  renderAll();
}

function renderAll() {
  renderSummary();
  renderTable();
}

/* ---------- form ---------- */
const form = document.getElementById("entry-form");
const tipsInput = document.getElementById("tips");
const hoursInput = document.getElementById("hours");
const preview = document.getElementById("preview");

function updatePreview() {
  const tips = parseFloat(tipsInput.value);
  const hours = parseFloat(hoursInput.value);
  if (tips > 0 && hours > 0) {
    preview.innerHTML = `That's <b>${fmtRate(tips / hours)}</b> for the day.`;
  } else {
    preview.innerHTML = "";
  }
}
tipsInput.addEventListener("input", updatePreview);
hoursInput.addEventListener("input", updatePreview);

form.addEventListener("submit", e => {
  e.preventDefault();
  const date = document.getElementById("date").value;
  const tips = parseFloat(tipsInput.value);
  const hours = parseFloat(hoursInput.value);
  if (!date || !(tips >= 0) || !(hours >= 0)) return;
  addEntry(date, tips, hours);
  tipsInput.value = "";
  hoursInput.value = "";
  preview.innerHTML = "";
  tipsInput.focus();
});

/* ---------- view tabs ---------- */
document.getElementById("tabs").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  currentView = e.target.dataset.view;
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b === e.target));
  renderTable();
});

/* ---------- export / import (backup) ---------- */
document.getElementById("export-btn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tip-tracker-backup.json";
  a.click();
});
document.getElementById("import-btn").addEventListener("click", () =>
  document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (Array.isArray(data)) { entries = data; save(); renderAll(); alert("Imported " + data.length + " entries."); }
    } catch { alert("Could not read that file."); }
  };
  reader.readAsText(file);
});

/* ---------- init ---------- */
document.getElementById("date").value = todayStr();
renderAll();
</script>
</body>
</html>
